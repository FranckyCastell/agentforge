# ─── MCP Server Registry ─────────────────────────────────────────────
#
# Central registry of MCP servers. Agents reference these by name
# in their config.yaml under `mcps:`.
#
# Types:
#   local  — stdio command (command + args + env)
#   remote — URL-based (url)
#
# Environment variables: use ${VAR_NAME} syntax, resolved at load time.
# `enabled: false` disables a server without removing it.
#
# Example agent config.yaml:
#   mcps:
#     - weather-mcp
#     - duckduckgo-search

weather-mcp:
  type: local
  command: python3
  args: ["-m", "mcp_weather_server"]

duckduckgo-search:
  type: local
  command: npx
  args: ["-y", "duckduckgo-mcp"]

